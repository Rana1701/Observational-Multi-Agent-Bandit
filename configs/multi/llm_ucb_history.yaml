experiment:
  runs: 10
  horizon: 100
  seed: 42
  n_jobs: 1
  interaction: sequential
  order: [ucb, llm_history, llm_no_history]
  output_dir: results/multi/llm_ucb_history
  track_other_actions_for: [ucb]

environment:
  n_arms: 2
  delta: 0.2
  best_mean: 0.5

agents:
  - name: ucb
    class: UCB
  - name: llm_history
    class: LLM
    prompt: history
    params:
      model: Qwen/Qwen2.5-7B-Instruct
  - name: llm_no_history
    class: LLM
    prompt: no_history
    params:
      model: Qwen/Qwen2.5-7B-Instruct
