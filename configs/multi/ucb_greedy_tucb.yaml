experiment:
  runs: 20
  horizon: 500
  seed: 42
  n_jobs: 4
  interaction: sequential
  order: [ucb, greedy, tucb]
  output_dir: results/multi/ucb_greedy_tucb

environment:
  n_arms: 2
  delta: 0.2
  best_mean: 0.5

agents:
  - name: ucb
    class: UCB
  - name: greedy
    class: GreedyFollower
    observes: [ucb]
  - name: tucb
    class: TUCB
    observes: [ucb]
    params:
      nbr_neighbours: 1
