experiment:
  runs: 2000
  horizon: 1000
  seed: 42
  n_jobs: 4
  interaction: sequential
  order: [ucb, greedy, tucb]
  output_dir: results/multi/tucb_figure1_delta_01

environment:
  n_arms: 2
  delta: 0.1
  best_mean: 0.9

agents:
  - name: ucb
    class: UCB
  - name: greedy
    class: GreedyFollower
    observes: [ucb]
  - name: tucb
    class: TUCB
    observes: [ucb]
    params:
      nbr_neighbours: 1
