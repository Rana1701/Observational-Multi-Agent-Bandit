experiment:
  runs: 200
  horizon: 100
  seed: 42
  n_jobs: 4
  interaction: sequential
  input_dir: Target-UCB/Human bandit dataset/cliques/
  output_dir: results/multi/figure6_tucb_clique

environment:
  n_arms: 2
  delta: 0.2
  best_mean: 0.6
  probs: [0.6,0.4]

agents:
  - name: tucb
    class: TUCB
    observes: [Human]
    params:
      nbr_neighbours: 1

humanFiles:
  files : ["human_clique_2_plays.csv"]
