experiment:
  seed: 40
  n_jobs: 4
  output_dir: results/multi/figure1_top
  horizon: 200
  runs: 20
  interaction: sequential

environment:
  n_arms: 5
  delta: 0.2
  best_mean: 0.6
  probs: [0.6, 0.4, 0.4, 0.4, 0.4]

agents:
  - name: ucb
    class: UCB
  - name: ts
    class: TS
  - name: Greedy
    class: Greedy
  - name: llm_history
    class: LLM
    prompt: history
    params:
      model: Qwen/Qwen2.5-7B-Instruct