experiment:
  seed: 40
  n_jobs: 1
  output_dir: results/multi/figure1_llm_krishnamurthy
  horizon: 500
  runs: 20
  interaction: sequential
  order: [ucb1,Greedy, ts ,llm_krishnamurthy]

environment:
  n_arms: 5
  delta: 0.2
  best_mean: 0.6
  probs: [0.4, 0.4, 0.6, 0.4, 0.4]

agents:
  - name: ucb1
    class: UCB1
  - name: ts
    class: TS
  - name: Greedy
    class: Greedy
  - name: llm_krishnamurthy
    class: LLM
    prompt: krishnamurthy_solo
    params:
      model: Qwen/Qwen2.5-7B-Instruct
    prompt_tuple: ["B", "S", "S", "Ce", "0"]