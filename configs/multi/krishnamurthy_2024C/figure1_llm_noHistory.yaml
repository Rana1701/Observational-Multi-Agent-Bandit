experiment:
  seed: 40
  n_jobs: 4
  output_dir: results/multi/figure1_llm_noHistory
  horizon: 5
  runs: 1
  interaction: sequential
  order: [ucb1,Greedy, ts ,llm_no_history]

environment:
  n_arms: 5
  delta: 0.2
  best_mean: 0.6
  probs: [0.6, 0.4, 0.4, 0.4, 0.4]

agents:
  - name: ucb1
    class: UCB1
  - name: ts
    class: TS
  - name: Greedy
    class: Greedy
  - name: llm_no_history
    class: LLM
    prompt: no_history
    params:
      model: Qwen/Qwen2.5-7B-Instruct