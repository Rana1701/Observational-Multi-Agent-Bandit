experiment:
  runs: 2000
  horizon: 1000
  seed: 42
  n_jobs: 4
  interaction: simultaneous
  output_dir: results/figure3/tucb_clique

environment:
  n_arms: 2
  best_mean: 0.5
  delta: 0.1

