experiment:
  seed: 40
  n_jobs: 4
  output_dir: results/multi/current/ucb_imitation
  horizon: 500
  runs: 20
  interaction: sequential
  order: [ucb1,Greedy, ts ,llm_ucb]

environment:
  n_arms: 5
  delta: 0.2
  best_mean: 0.6
  probs: [0.4, 0.4, 0.6, 0.4, 0.4]

agents:
  - name: ucb1
    class: UCB1
  - name: ts
    class: TS
  - name: Greedy
    class: Greedy
  - name: llm_ucb
    class: LLM
    prompt: ucb_history
    params:
      model: Qwen/Qwen2.5-7B-Instruct