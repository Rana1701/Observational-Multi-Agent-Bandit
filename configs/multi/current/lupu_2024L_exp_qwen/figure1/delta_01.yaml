experiment:
  runs: 2000
  horizon: 1000
  seed: 42
  n_jobs: 4
  interaction: sequential
  order: [ucb, greedy, Qwen]
  track_other_actions_for: ["ucb"]
  output_dir: results/multi/current/lupu_2019L_exp_qwen/figure1/delta_01
  add_opt: False

environment:
  n_arms: 2
  delta: 0.1
  best_mean: 0.9

agents:
  - name: ucb
    class: UCB
  - name: greedy
    class: GreedyFollower
    observes: [ucb]
  - name: Qwen
    class: LLM
    prompt: default
    params:
      model: Qwen/Qwen2.5-7B-Instruct
