experiment:
  runs: 2000
  horizon: 15000
  seed: 42
  n_jobs: 4
  interaction: sequential
  order: [alphaOptimal, greedy, Qwen]
  track_other_actions_for: ["alphaOptimal"]
  output_dir: results/multi/current/lupu_2019L_exp_qwen/figure2/alpha_09

environment:
  n_arms: 2
  delta: 0.1
  best_mean: 0.9

agents:
  - name: alphaOptimal
    class: alphaOptimal
    params:
      alpha : 0.9
  - name: greedy
    class: GreedyFollower
    observes: [alphaOptimal]
  - name: Qwen
    class: LLM
    prompt: default
    params:
      model: Qwen/Qwen2.5-7B-Instruct
